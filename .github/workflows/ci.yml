name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Black style check
        run: black --check .

      - name: Run test suite
        run: pytest
